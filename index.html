<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nodiaque</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #04040f;
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 10px;
    color: #dde;
  }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    letter-spacing: 0.3em;
    color: #aabbcc;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    background: rgba(10,10,50,0.85);
    border: 1px solid rgba(80,100,200,0.4);
    border-radius: 8px;
    padding: 10px 16px;
    box-shadow: 0 2px 12px rgba(0,0,80,0.5);
  }
  .controls label { font-size: .8rem; color: #8899aa; }
  .controls input[type=number] {
    width: 62px; padding: 5px 6px; border: 1px solid #ccc;
    border-radius: 4px; font-size: .88rem; text-align: center;
    background: #fafafa;
  }
  .controls input[type=number]:focus { outline: none; border-color: #888; }
  .sep { color: #bbb; }
  button {
    padding: 6px 20px; background: #2a2a2a; color: #fff;
    border: none; border-radius: 5px; font-family: 'Cinzel', serif;
    font-size: .78rem; letter-spacing: .12em; cursor: pointer;
    transition: background .18s; margin-left: 6px;
  }
  button:hover { background: #555; }
  .chart-wrap { width: min(860px, 97vw); height: min(860px, 97vw); }
  #chart { width: 100%; height: 100%; overflow: visible; }
  .legend {
    margin-top: 14px;
    background: rgba(8,8,50,0.82);
    border: 1px solid rgba(80,110,220,0.35);
    border-radius: 10px;
    padding: 12px 20px;
    box-shadow: 0 2px 12px rgba(0,0,80,0.4);
    font-family: 'Cinzel', serif;
    font-size: .78rem;
    letter-spacing: .03em;
    line-height: 1.9;
    max-width: min(860px, 97vw);
    margin-left: auto;
    margin-right: auto;
  }
  .legend .signe     { font-size: .95rem; font-weight: 700; color: #ff8888; display: block; margin-bottom: 4px; }
  .legend .planets   { color: #ccd; display: block; }
  .legend .alphayear { color: #aabbcc; font-style: italic; display: block; margin-top: 4px; }
  .date-cartouche {
    display: inline-block;
    margin: 10px auto 0;
    padding: 6px 18px;
    background: rgba(10,10,60,0.85);
    border: 1px solid rgba(80,110,220,0.4);
    border-radius: 20px;
    font-family: 'Cinzel', serif;
    font-size: .92rem;
    font-weight: 600;
    color: #aaccff;
    letter-spacing: .06em;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    text-align: center;
  }

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,30,0.85);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:linear-gradient(135deg,#0a0a30 0%,#181860 100%);border:1px solid rgba(100,140,255,0.4);border-radius:14px;padding:22px 26px;max-width:min(500px,92vw);width:100%;color:#dde;box-shadow:0 8px 40px rgba(0,0,80,0.8);position:relative;font-family:'Lato',sans-serif;}
  .modal-close{position:absolute;top:10px;right:14px;font-size:1.4rem;color:#aabbdd;cursor:pointer;background:none;border:none;}
  .modal-close:hover{color:white;}
  .modal-title{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:700;color:#ff9999;margin-bottom:3px;}
  .modal-month{font-size:.78rem;color:#99aacc;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
  .modal-defluence{font-size:.85rem;color:#ffcc88;margin-bottom:10px;font-style:italic;}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin-bottom:12px;font-size:.8rem;}
  .modal-grid span{color:#aabbdd;}.modal-grid strong{color:#ddeeff;}
  .modal-texte{font-size:.8rem;color:#ccd;line-height:1.65;border-top:1px solid rgba(100,140,255,0.2);padding-top:10px;margin-bottom:10px;}
  .modal-affinites{font-size:.76rem;color:#99bbdd;}

  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.85) rotate(-8deg); }
    to   { opacity: 1; transform: scale(1)    rotate(0deg);  }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  #chart { animation: none; }
  #chart.animating { animation: fadeInScale 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  .legend.animating { animation: fadeIn 0.8s ease forwards; }
  .date-cartouche.animating { animation: fadeIn 0.6s ease forwards; }
</style>
</head>
<body>
<h1>Nodiaque</h1>

<div class="controls">

<script>
"use strict";
const NS = 'http://www.w3.org/2000/svg';

// ── Bodies — epoch 1/1/1901 ────────────────────────────────────
const BODIES = [
  {name:'Soleil',    speed:0.985626283,  pos1901:1.554436,   icon:'sun'     },

// ── Helpers ────────────────────────────────────────────────────
function el(tag, attrs={}) {
  const e = document.createElementNS(NS, tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}
function tx(str, attrs={}) { const e=el('text',attrs); e.textContent=str; return e; }
function polar(r, deg) {
  const rad=(deg-90)*Math.PI/180;
  return {x:r*Math.cos(rad), y:r*Math.sin(rad)};
}
function app(p,...kids){ kids.forEach(k=>p.appendChild(k)); return p; }

// ── Glyph function — Affinity SVG exports ────────────────────

const GLYPH_COLORS = [
  '#f0f0f0',  // 0  Licorne   — blanc nacré (Cristal)
  '#7b2d8b',  // 1  Quadran   — violet (Améthyste)
  '#2d7000',  // 2  Serpent   — vert acide (Jaspe)
  '#b07800',  // 3  Buffle    — jaune (Ambre)
  '#6060a0',  // 4  Pentacle  — argent (Mercurium)
  '#1a5c5a',  // 5  Neptunus  — vert foncé bleuté (Jade)
  '#8a6030',  // 6  Stella    — beige (Agathe)
  '#2a8a3a',  // 7  Lynx      — vert forêt (Emeraude)
  '#9a7a5a',  // 8  Caprus    — ébène (Jais)
  '#d45a00',  // 9  Coq       — orange (Cornaline)
  '#c01818',  // 10 Equus     — rouge (Rubis)
  '#4a90d4',  // 11 Aigle     — bleu ciel (Saphir)

function glyph(i, gp){

      );

      app(g,
        el('path',{d:"M118.573,99.881c0,-9.747 -7.912,-17.66 -17.656,-17.66c-9.745,0 -17.656,7.913 -17.656,17.66c0,9.747 7.912,17.66 17.656,17.66c9.745,0 17.656,-7.913 17.656,-17.66Z",fill:'none',stroke:col,'stroke-width':'13','stroke-linecap':'round','stroke-linejoin':'round'}),
        el('path',{d:"M100.913,22.055l16.992,43.046l44.25,-13.558l-23.05,40.138l38.175,26.137l-45.742,6.996l3.367,46.15l-33.992,-31.404l-33.996,31.404l3.371,-46.15l-45.738,-6.996l38.175,-26.137l-23.054,-40.138l44.246,13.558l16.996,-43.046Z",fill:'none',stroke:col,'stroke-width':'13','stroke-linecap':'round','stroke-linejoin':'round'})

        el('path',{d:"M89.449,72.017l-3.504,-29.279l-26.904,-9.504l41.875,-22.246l15.092,25.412",fill:'none',stroke:col,'stroke-width':'15','stroke-linecap':'round','stroke-linejoin':'round'})

  }
  return g;
}





// ── Maths ──────────────────────────────────────────────────────
function toJD(d,m,y,h=12,mn=0){
  const A=Math.floor((14-m)/12), Y=y+4800-A, M=m+12*A-3;
  return d+Math.floor((153*M+2)/5)+365*Y+Math.floor(Y/4)
        -Math.floor(Y/100)+Math.floor(Y/400)-32045+(h-12)/24+mn/1440;
}
const JD_1901 = toJD(1,1,1901);
function daysSince1901(d,m,y,h,mn){ return toJD(d,m,y,h,mn)-JD_1901; }
function bodyAngle(b,days){ return ((b.pos1901+b.speed*days)%360+360)%360; }

const PLANET_SIZE = {
  'sun':12, 'moon':12, 'mercury':12, 'venus':12, 'mars':12,
  'asteroid':12, 'jupiter':18, 'saturn':12, 'uranus':12,
  'neptune':10, 'pluto':12, 'alpha':12, 'terra':12
};

function planetIcon(type, pp){
  const SIZE = PLANET_SIZE[type] || 18;
  const g = el('g');
  const src = PLANET_IMG[type];
  if(src){
    const img = el('image');
    img.setAttribute('href', src);
    img.setAttribute('x',     (pp.x - SIZE).toFixed(1));
    img.setAttribute('y',     (pp.y - SIZE).toFixed(1));
    img.setAttribute('width',  SIZE*2);
    img.setAttribute('height', SIZE*2);
    img.setAttribute('filter', 'url(#invert-bright)');
    g.appendChild(img);
  } else {
    app(g, el('circle',{cx:pp.x.toFixed(1),cy:pp.y.toFixed(1),
      r:'10',fill:'#888',stroke:'#333','stroke-width':'1'}));
  }
  return g;
}

function drawBase(svg){

  svg.insertAdjacentHTML('afterbegin',`<!-- Fond cosmos -->

        <rect x="-480" y="-480" width="960" height="960" fill="url(#nebula3)"/>
        <rect x="-480" y="-480" width="960" height="960" fill="url(#outerLight)"/>
        <g filter="url(#starGlow)">
          <circle cx="-380" cy="-310" r="1.8" fill="white" opacity="0.9"/>
          <circle cx="310"  cy="-400" r="1.5" fill="white" opacity="0.85"/>
          <circle cx="-420" cy="180"  r="1.6" fill="white" opacity="0.9"/>
          <circle cx="400"  cy="260"  r="1.4" fill="white" opacity="0.8"/>

          <circle cx="-440" cy="360"  r="0.5"/><circle cx="200" cy="360"  r="0.6"/>
        </g>`);
  app(svg,
    el('g',{}),
    el('circle',{cx:0,cy:0,r:RGO,fill:'rgba(15,15,70,0.80)',stroke:'rgba(80,110,220,0.35)','stroke-width':'1'}),
    el('circle',{cx:0,cy:0,r:RGI,fill:'rgba(8,8,45,0.75)',stroke:'rgba(60,90,200,0.3)','stroke-width':'0.7'}),
    el('circle',{cx:0,cy:0,r:RNO,fill:'rgba(10,10,55,0.85)',stroke:'rgba(60,90,180,0.4)','stroke-width':'1'}),
    el('circle',{cx:0,cy:0,r:RNI,fill:'#eae6e2',stroke:'#aaa','stroke-width':'0.7'}),
    el('circle',{cx:0,cy:0,r:RMO,fill:'rgba(12,12,60,0.80)',stroke:'rgba(60,90,180,0.3)','stroke-width':'0.8'}),

    app(svg,
      el('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:'rgba(100,140,255,0.5)','stroke-width':i%3===0?'1.5':'0.9'}),

    );
  }

  app(svg,
    el('line',{x1:-(RS+22),y1:0,x2:RS+22,y2:0,stroke:'rgba(80,120,255,0.25)','stroke-width':'0.5'}),
    el('line',{x1:0,y1:-(RS+22),x2:0,y2:RS+22,stroke:'rgba(80,120,255,0.25)','stroke-width':'0.5'})
  );

  // Sector labels — grands, gras, fond arrondi (pill) — largeur adaptée
  // Largeur par secteur (basée sur nb de caractères × 8.2 + 16 de padding)
  const PILL_W = SECTORS.map(s => Math.max(s.length * 8.2 + 18, 52));
  for(let i=0;i<12;i++){
    const a=i*30+15, lp=polar(RS+6,a), rot=a>90&&a<270?a+180:a;
    const grp=el('g',{transform:`rotate(${rot},${lp.x},${lp.y})`,
      style:'cursor:pointer'});
    grp.addEventListener('click',()=>openSignModal(i));
    const pw=PILL_W[i], ph=20, pr=10;
    grp.appendChild(el('rect',{
      x:lp.x-pw/2, y:lp.y-ph/2, width:pw, height:ph, rx:pr, ry:pr,
      fill:'rgba(15,15,100,0.90)', opacity:'0.95'
    }));
    grp.appendChild(tx(SECTORS[i],{
      x:lp.x, y:lp.y,
      'text-anchor':'middle', 'dominant-baseline':'central',
      'font-size':'13', 'font-family':'Cinzel,serif', 'font-weight':'700',
      fill:'white', 'letter-spacing':'0.04em'
    }));
    svg.appendChild(grp);
  }

  // Number ring

    const a=i*30+15, np=polar((RNO+RNI)/2,a);
    app(svg,tx(String(i+1),{x:np.x,y:np.y,'text-anchor':'middle','dominant-baseline':'central',
      'font-size':'17','font-family':'Cinzel,serif','font-weight':'700',fill:'white'}));
  }

  // Month ring
  for(let i=0;i<12;i++){
    const a=i*30+15, mp=polar((RMO+RMI)/2,a), rot=a>90&&a<270?a+180:a;
    app(svg,tx(MONTHS[i],{x:mp.x,y:mp.y,'text-anchor':'middle','dominant-baseline':'central',
      'font-size':'14','font-family':'Lato,sans-serif','font-weight':'700',fill:'white',
      transform:`rotate(${rot},${mp.x},${mp.y})`}));
  }

  // Glyph ring — gp passé directement à glyph(i, gp)
  for(let i=0;i<12;i++){
    const a=i*30+15, gp=polar((RGO+RGI)/2,a);
    svg.appendChild(glyph(i, gp));
  }

  // Tick marks
  for(let a=0;a<360;a+=5){
    if(a%30===0) continue;
    const maj=a%15===0, p1=polar(RGI-1,a), p2=polar(RGI-(maj?7:4),a);
    app(svg,el('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:'#777','stroke-width':maj?'1.1':'0.6'}));
  }
}

// ── Draw planets ───────────────────────────────────────────────
function drawPlanets(svg, results, d,m,y,h,mn){
  const yy=String(y).slice(-2).padStart(2,'0');
  const dStr=`${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${yy} ${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;





  // Planet placement — anti-overlap, base = RBASE (plus loin du centre)
  const placed=[];

  // ── Stratégie B : icône sur l'axe radial, libellé en bout ──
  // ICON_SIZE = rayon du cercle icône
  const ICON_SIZE = 10;
  // LABEL_H = hauteur réservée pour le libellé (px SVG)
  const LABEL_H = 14;
  // GAP entre icône et libellé
  const GAP = 4;

  // Anti-chevauchement : on stocke les slots occupés
  // Un slot = {angle, r_icon} — on pousse rr si conflit angulaire ET radial
  for(const r of results){
    // Cherche un rayon libre sur cet axe angulaire
    let rr = RBASE;
    for(let t=0; t<16; t++){
      let ok = true;
      for(const p of placed){
        const da = Math.abs(((r.angle - p.a + 540) % 360) - 180);
        // Conflit si proche angulairement ET radialement
        if(da < 20 && Math.abs(rr - p.r) < (ICON_SIZE*2 + 6)){
          ok = false; break;
        }
      }
      if(ok) break;
      rr += ICON_SIZE*2 + 8;
    }
    placed.push({a: r.angle, r: rr});

    // Point de position sur le bord du disque
    const ep = polar(RGO+3, r.angle);
    // Icône sur l'axe
    const pp = polar(rr, r.angle);
    // Libellé au-delà de l'icône, toujours dans le sens radial
    const lp = polar(rr + ICON_SIZE + GAP + LABEL_H/2, r.angle);

    // Trait du bord du disque jusqu'à l'icône
    app(svg,
      el('line',{x1:ep.x,y1:ep.y,x2:pp.x,y2:pp.y,
        stroke:'rgba(120,160,255,0.6)','stroke-width':'1.2'}),
      // Point noir sur le bord
      el('circle',{cx:ep.x,cy:ep.y,r:'3.5',fill:'white'})
    );

    // Icône (cercle coloré)
    const ico = planetIcon(r.icon, pp);
    svg.appendChild(ico);

    // Libellé souligné en bout d'axe
    const anchor = (r.angle > 90 && r.angle < 270) ? 'end' : 'start';
    const lx = lp.x + (anchor==='start' ? ICON_SIZE+2 : -(ICON_SIZE+2));
    // Axandans : libellé avec heure + flèche sur son axe angulaire
    const label = r.name === 'Axandans'
      ? `Axandans ${String(h).padStart(2,'0')}h${String(mn).padStart(2,'0')}`
      : `${r.name} ${Math.round(r.angle)}°`;
    const tw = label.length * 6.2;
    const ulx1 = anchor==='start' ? lx : lx - tw;
    app(svg,
      tx(label,{x:lx, y:lp.y,
        'text-anchor':anchor, 'dominant-baseline':'central',
        'font-size':'11.5','font-family':'Lato,sans-serif',fill:'white'}),
      el('line',{x1:ulx1,y1:lp.y+6,x2:ulx1+tw,y2:lp.y+6,
        stroke:'rgba(100,140,255,0.4)','stroke-width':'0.6'})
    );
    // Flèche sur l'axe de Terra/Axandans
    if(r.name === 'Axandans'){
      // Flèche pointant vers l'extérieur dans la direction de l'axe
      const arrowR = rr - ICON_SIZE - 8;
      const ap = polar(arrowR, r.angle);
      const ap2 = polar(arrowR - 20, r.angle);
      // Direction perpendiculaire pour les ailerons
      const perpA = r.angle + 90;
      const wing1 = polar(arrowR - 14, r.angle);
      const wp1a = polar(8, perpA);
      const wp1b = {x:-wp1a.x, y:-wp1a.y};
      app(svg,
        el('polygon',{
          points:`${ap.x.toFixed(1)},${ap.y.toFixed(1)} ${(wing1.x+wp1a.x).toFixed(1)},${(wing1.y+wp1a.y).toFixed(1)} ${ap2.x.toFixed(1)},${ap2.y.toFixed(1)} ${(wing1.x+wp1b.x).toFixed(1)},${(wing1.y+wp1b.y).toFixed(1)}`,
          fill:'#99bbdd', stroke:'none'
        })
      );
    }
  }


}

function compute(){
  // Animation de mise en place
  const chartEl = document.getElementById('chart');
  const legendEl = document.getElementById('legend');
  const cartEl = document.getElementById('dateCartouche');
  chartEl.classList.remove('animating');
  legendEl.classList.remove('animating');
  cartEl.classList.remove('animating');
  void chartEl.offsetWidth; // force reflow
  chartEl.classList.add('animating');
  legendEl.classList.add('animating');
  cartEl.classList.add('animating');
  const d =parseInt(document.getElementById('iDay').value)  ||6;
  const m =parseInt(document.getElementById('iMonth').value)||1;
  const y =parseInt(document.getElementById('iYear').value) ||1938;
  const h =parseInt(document.getElementById('iHour').value) ||6;
  const mn=parseInt(document.getElementById('iMin').value)  ||15;

  const days=daysSince1901(d,m,y,h,mn);
  const results=BODIES.map(b=>({...b, angle:bodyAngle(b,days)}));

  const svg=document.getElementById('chart');
  drawBase(svg);
  drawPlanets(svg,results,d,m,y,h,mn);

  // Légende
  const sunAngle=results.find(r=>r.name==='Soleil').angle;
  const sunSec=SECTORS[sectorOf(sunAngle)];
  const alphaJan=bodyAngle(BODIES.find(b=>b.name==='Alpha'), daysSince1901(1,1,y,0,0));
  const alphaSec=SECTORS[sectorOf(alphaJan)];

  // Résumé complet des positions
  const sunDeg = Math.round(results.find(r=>r.name==='Soleil').angle % 30);
  const ax = results.find(r => r.name === 'Axandans');
  const alphaR = results.find(r => r.name === 'Alpha');

  const planetLines = results
    .filter(r => r.name !== 'Axandans' && r.name !== 'Alpha')
    .map(r => `${r.name} ${Math.round(r.angle)}° <em>${SECTORS[sectorOf(r.angle)]}</em>`)
    .join(' &nbsp;·&nbsp; ');

  document.getElementById('legend').innerHTML =
    `<span class="signe">Signe Nodiacal : ${sunSec} &mdash; Soleil ${sunDeg}°</span>
     <span class="planets">${planetLines}</span>
     <span class="alphayear">Alpha ${Math.round(alphaR.angle)}° <em>${SECTORS[sectorOf(alphaR.angle)]}</em> &mdash; Signe de l'année ${y} : ${alphaSec} &nbsp;·&nbsp; Axandans ${Math.round(ax.angle)}° <em>${SECTORS[sectorOf(ax.angle)]}</em></span>`;

  // Cartouche date lisible
  const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const nomMois = MOIS[m-1];
  const hStr  = String(h).padStart(2,'0');
  const mnStr = String(mn).padStart(2,'0');
  document.getElementById('dateCartouche').textContent =
    `${d} ${nomMois} ${y}  —  ${hStr} h ${mnStr} mn`;
}

compute();
